<head>
    <style> body {
        margin: 0;
    } </style>

    <script src="https://cdn.jsdelivr.net/npm/force-graph"></script>
</head>

<body>
<div id="graph"></div>

<script>
    const gData = {
  "nodes" : [ {
    "id" : "stanza_service",
    "size" : 362
  }, {
    "id" : "zeeguu/core",
    "size" : 23538
  }, {
    "id" : "zeeguu/config",
    "size" : 51
  }, {
    "id" : "zeeguu",
    "size" : 1
  }, {
    "id" : "zeeguu/operations",
    "size" : 5694
  }, {
    "id" : "zeeguu/api",
    "size" : 8693
  }, {
    "id" : "zeeguu/cl",
    "size" : 3
  }, {
    "id" : "zeeguu/logging",
    "size" : 22
  }, {
    "id" : "tools/one_time",
    "size" : 234
  }, {
    "id" : "tools",
    "size" : 7854
  }, {
    "id" : "tools/migrations",
    "size" : 3089
  }, {
    "id" : "tools/crawler",
    "size" : 644
  }, {
    "id" : "tools/old",
    "size" : 933
  }, {
    "id" : "tools/audio-engleza",
    "size" : 435
  }, {
    "id" : "tools/ml",
    "size" : 384
  }, {
    "id" : "tools/user_word_integrity",
    "size" : 710
  }, {
    "id" : "tools/report_generator",
    "size" : 5079
  }, {
    "id" : "tools/stiri-simple",
    "size" : 291
  }, {
    "id" : "tools/sql",
    "size" : 93
  }, {
    "id" : "ROOT",
    "size" : 203
  } ],
  "links" : [ ]
}

    const maxNodeSize = gData.nodes.map(n => n.size).reduce((a, b) => Math.max(a, b));
    const maxCount = gData.links.map(l => l.count).reduce((a, b) => Math.max(a, b));

    gData.links = gData.links.map(l => {
        return {source: l.target, target: l.source, count: l.count}
    });
    const colorOf = (node) => {
        if (!node.id.startsWith("[")) return "rgba(135, 206, 235, 0.6)";
        return "rgba(100,100,100,0.6)";
    }

    const elem = document.getElementById('graph');
    const Graph = ForceGraph()(elem)
        .graphData(gData)
        .nodeRelSize(4)
        .nodeVal(n => Math.max(20 * n.size / maxNodeSize, 0.001))
        .nodeLabel(n => n.id + " (" + n.size + ")")
        .nodeColor(n => colorOf(n))
        .linkDirectionalParticles(1)
        .linkDirectionalParticleSpeed(d => d.count / maxCount * 0.01)
        .linkOpacity(0.1)
        .linkWidth(d => 3 * d.count / maxCount + 0.1);

</script>
</body>
