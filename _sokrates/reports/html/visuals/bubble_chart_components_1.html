<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>A bubble chart view on componets</title>
    <script type="text/javascript" src="https://d3js.org/d3.v4.min.js"></script>

    <style type="text/css">
        svg {
            font: 14px sans-serif;
        }
    </style>
</head>
<body>
<script type="text/javascript">

    var dataset = {
        "name": "cluster",
        "children": [ {
  "name" : "stanza_service",
  "color" : "",
  "size" : 362,
  "children" : [ ]
}, {
  "name" : "zeeguu/core",
  "color" : "",
  "size" : 23538,
  "children" : [ ]
}, {
  "name" : "zeeguu/config",
  "color" : "",
  "size" : 51,
  "children" : [ ]
}, {
  "name" : "zeeguu",
  "color" : "",
  "size" : 1,
  "children" : [ ]
}, {
  "name" : "zeeguu/operations",
  "color" : "",
  "size" : 5694,
  "children" : [ ]
}, {
  "name" : "zeeguu/api",
  "color" : "",
  "size" : 8693,
  "children" : [ ]
}, {
  "name" : "zeeguu/cl",
  "color" : "",
  "size" : 3,
  "children" : [ ]
}, {
  "name" : "zeeguu/logging",
  "color" : "",
  "size" : 22,
  "children" : [ ]
}, {
  "name" : "tools/one_time",
  "color" : "",
  "size" : 234,
  "children" : [ ]
}, {
  "name" : "tools",
  "color" : "",
  "size" : 7854,
  "children" : [ ]
}, {
  "name" : "tools/migrations",
  "color" : "",
  "size" : 3089,
  "children" : [ ]
}, {
  "name" : "tools/crawler",
  "color" : "",
  "size" : 644,
  "children" : [ ]
}, {
  "name" : "tools/old",
  "color" : "",
  "size" : 933,
  "children" : [ ]
}, {
  "name" : "tools/audio-engleza",
  "color" : "",
  "size" : 435,
  "children" : [ ]
}, {
  "name" : "tools/ml",
  "color" : "",

}, {
  "name" : "tools/user_word_integrity",

}, {

}, {
  "name" : "tools/sql",

  "children" : [ ]
}, {
  "name" : "ROOT",
  "color" : "",
  "size" : 203,
  "children" : [ ]
} ]
    }

    var diameter = 800;
    var color = d3.scaleOrdinal(d3.schemeCategory20);

    var bubble = d3.pack(dataset)
        .size([diameter, diameter])
        .padding(1.5);

    var svg = d3.select("body")
        .append("svg")
        .attr("width", diameter)
        .attr("height", diameter)
        .attr("class", "bubble");

    var nodes = d3.hierarchy(dataset)
        .sum(function(d) { return d.size; });

    var node = svg.selectAll(".node")
        .data(bubble(nodes).descendants())
        .enter()
        .filter(function(d){
            return  !d.children
        })
        .append("g")
        .attr("class", "node")
        .attr("transform", function(d) {
            return "translate(" + d.x + "," + d.y + ")";
        });

    node.append("title")
        .text(function(d) {
            return d.data.name + ": " + d.data.size;
        });

    node.append("circle")
        .attr("r", function(d) {
            return d.r;
        })
        .style("fill", function(d,i) {
            return "rgb(192, 222, 237)";
        });

    node.append("text")
        .attr("dy", ".2em")
        .style("text-anchor", "middle")
        .text(function(d) {
            return d.data.name.substring(0, d.r / 3);
        })
        .attr("font-family", "sans-serif")
        .attr("fill", "black");

    node.append("text")
        .attr("dy", "1.3em")
        .style("text-anchor", "middle")
        .text(function(d) {
            return d.data.Count;
        })
        .attr("font-family",  "Gill Sans", "Gill Sans MT")
        .attr("fill", "white");

    d3.select(self.frameElement)
        .style("height", diameter + "px");

</script>
</body>
</html>
